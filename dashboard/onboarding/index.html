<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uallak — איפיון עסקי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
:root {
  --bg: #F7F4EF;
  --ink: #1A1A1A;
  --accent: #FF4C1F;
  --green: #00C96E;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --gray: #8A8A8A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.chat-container { width:100%; max-width:680px; background:var(--card); border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.12); overflow:hidden; display:flex; flex-direction:column; height:90vh; max-height:780px; }
.chat-header { background:var(--ink); padding:20px 28px; display:flex; align-items:center; gap:14px; }
.chat-logo { font-size:22px; font-weight:700; color:white; letter-spacing:-1px; }
.chat-logo span { color:#FF4C1F; }
.chat-status { display:flex; align-items:center; gap:6px; font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
.status-dot { width:7px; height:7px; background:#00C96E; border-radius:50%; animation:pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
.chat-messages { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
.msg { display:flex; gap:12px; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
.msg-avatar { width:36px; height:36px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; flex-shrink:0; }
.msg-avatar.user-avatar { background:var(--accent); }
.msg-bubble { max-width:85%; padding:14px 18px; border-radius:18px; font-size:15px; line-height:1.6; }
.msg.bot .msg-bubble { background:#F0F0F0; border-radius:4px 18px 18px 18px; }
.msg.user .msg-bubble { background:var(--ink); color:white; border-radius:18px 4px 18px 18px; }
.msg.user { flex-direction:row-reverse; }
.options-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.option-btn { background:white; border:1.5px solid var(--border); padding:10px 16px; border-radius:100px; font-family:'Heebo',sans-serif; font-size:14px; cursor:pointer; transition:all 0.2s; color:var(--ink); }
.option-btn:hover { border-color:var(--accent); color:var(--accent); }
.option-btn.selected { background:var(--ink); color:white; border-color:var(--ink); }
.option-btn.multi.selected { background:var(--accent); border-color:var(--accent); color:white; }
.option-btn:disabled { cursor:default; opacity:0.6; }
.free-text-hint { font-size:12px; color:var(--gray); margin-top:8px; }
.typing { display:flex; align-items:center; gap:5px; padding:14px 18px; }
.typing span { width:7px; height:7px; background:var(--gray); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
.chat-input-area { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
.chat-input { flex:1; padding:12px 18px; border:1.5px solid var(--border); border-radius:100px; font-family:'Heebo',sans-serif; font-size:15px; outline:none; transition:border 0.2s; background:var(--bg); }
.chat-input:focus { border-color:var(--accent); }
.send-btn { width:44px; height:44px; background:var(--ink); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { background:var(--accent); }
.processing { position:fixed; inset:0; background:rgba(247,244,239,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.5s; }
.processing.active { opacity:1; pointer-events:all; }
.proc-logo { font-size:32px; font-weight:900; margin-bottom:40px; letter-spacing:-1px; }
.proc-logo span { color:var(--accent); }
.proc-ring { width:80px; height:80px; border:3px solid rgba(0,0,0,0.08); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:32px; }
@keyframes spin{to{transform:rotate(360deg);}}
.proc-text { font-size:18px; font-weight:500; margin-bottom:12px; }
.proc-sub { font-size:14px; color:var(--gray); text-align:center; max-width:300px; line-height:1.6; }
.proc-steps { display:flex; flex-direction:column; gap:10px; margin-top:28px; width:280px; }
.proc-step { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--gray); opacity:0.3; transition:opacity 0.6s; }
.proc-step.done { opacity:1; color:#1A1A1A; }
.proc-step-icon { font-size:18px; }
</style>
</head>

  </div>
</div>

<div class="chat-container">
  <div class="chat-header">
    <div>
      <div class="chat-logo">u<span>allak</span></div>
      <div class="chat-status"><span class="status-dot"></span><span data-i18n="status_online">המערכת פעילה</span></div>
    </div>
    <div id="langRow"></div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="userInput" dir="auto" data-i18n-placeholder="input_ph" placeholder="כתוב כאן..." onkeydown="if(event.key==='Enter') sendText()" />

    </button>
  </div>
</div>

// Multi-language detection of the "other / something else" option (both our
// fixed options and the LLM's translated dynamic ones)
const OTHER_PREFIXES = ['אחר', 'משהו אחר', 'other', 'something else', 'autre', 'أخرى', 'شيء آخر', 'другое', 'что-то другое'];
function isOtherOption(opt) {
  const low = (opt || '').trim().toLowerCase();
  return OTHER_PREFIXES.some(p => low.startsWith(p));
}

function localizeQuestion(q) {
  const lang = uallakI18n.current();
  if (lang === 'he') return q;
  const tr = Q_I18N[q.id] && Q_I18N[q.id][lang];
  if (!tr) return q;
  return { ...q, text: tr.text || q.text, options: tr.options || q.options };
}

let questions = BASE_QUESTIONS.map(localizeQuestion);
let currentQ = 0;
let answers = {};
let answerIdx = {};  // question id -> chosen option INDEX (language-independent conditional logic)

uallakI18n.init(CHROME);
uallakI18n.mountSwitcher(document.getElementById('langRow'));
// Mid-chat switch: re-localize every question not yet asked (base +
// conditional ids only — dynamic LLM questions pass through unchanged)
uallakI18n.onChange(() => { questions = questions.map(localizeQuestion); });

let dynamicQsAdded = false;

// שאלות "משמעותיות" שאחריהן מציגים תגובה קצרה וחמה, כדי שהצ'אט ירגיש כמו שיחה
// ולא כמו טופס - לא אחרי כל תשובה, רק בנקודות שבאמת שווה לעצור בהן
const REACTION_QUESTION_IDS = new Set(['recent_revenue', 'revenue_trend', 'financial_status', 'biggest_fear', 'organic_budget', 'new_business_expectations', 'new_business_concern']);

async function maybeReact(questionId, answerText, next) {
  if (!REACTION_QUESTION_IDS.has(questionId)) { setTimeout(next, 700); return; }
  showTyping();
  try {
    const q = questions.find(qq => qq.id === questionId);
    const res = await fetch('/api/reaction', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question_text: q ? q.text : '', answer_text: String(answerText) })
    });
    const data = await res.json();
    hideTyping();
    if (data.reaction) addMessage(data.reaction, 'bot');
    setTimeout(next, data.reaction ? 900 : 500);
  } catch (e) {
    hideTyping();
    setTimeout(next, 500);
  }
}

function addMessage(text, sender='bot', withOptions=null, multiOptions=null) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${sender==='user'?'user-avatar':''}`;
  avatar.textContent = sender==='bot' ? 'U' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const textDiv = document.createElement('div');
  textDiv.style.whiteSpace = 'pre-line';
  // Per-message direction: the bot replies in the client's language, so an
  // Arabic/Hebrew message renders RTL and English/French/Russian renders LTR
  textDiv.dir = 'auto';
  textDiv.textContent = text;
  bubble.appendChild(textDiv);

  if (withOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    withOptions.forEach((opt, optIdx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.dir = 'auto';
      btn.textContent = opt;
      btn.onclick = () => isOtherOption(opt)
        ? showOtherInput(btn, grid)
        : selectOption(opt, optIdx, btn, grid);
      grid.appendChild(btn);
    });
    bubble.appendChild(grid);
    const hint = document.createElement('div');
    hint.className = 'free-text-hint';
    hint.textContent = uallakI18n.t('free_text_hint');
    bubble.appendChild(hint);
  }

  if (multiOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    multiSelected = [];
    multiOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn multi';
      btn.dir = 'auto';
      btn.textContent = opt;
      btn.onclick = () => toggleMulti(opt, btn);
      grid.appendChild(btn);
    });
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'option-btn';
    confirmBtn.textContent = uallakI18n.t('confirm_multi');
    confirmBtn.style.cssText = 'background:#1A1A1A;color:white;width:100%;margin-top:4px;';
    confirmBtn.onclick = () => confirmMulti(grid);
    grid.appendChild(confirmBtn);
    bubble.appendChild(grid);
    const hint = document.createElement('div');
    hint.className = 'free-text-hint';
    hint.textContent = uallakI18n.t('free_text_hint');
    bubble.appendChild(hint);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">U</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function selectOption(opt, optIdx, btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => {
    grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
    addMessage(opt, 'user');
    const questionId = questions[currentQ].id;
    answers[questionId] = opt;          // the text, in the client's language (feeds the LLMs)
    answerIdx[questionId] = optIdx;     // the index — language-independent branching
    applyConditionalLogic(questionId, optIdx);
    currentQ++;
    maybeReact(questionId, opt, nextQuestion);
  }, 300);
}

// שאלות/הודעות שמוכנסות דינמית לתוך questions[] בהתאם לתשובות קודמות - אותו דפוס
// כמו הוספת השאלות הדינמיות מה-API, רק מבוסס על תשובות שכבר ניתנו במקום קריאת שרת.
// Hebrew here is canonical; Q_I18N carries the translations (localizeQuestion applies them).
const CONDITIONAL_QUESTIONS = {
  new_business_expectations: {
    id: 'new_business_expectations',
    type: 'free_text',
    text: 'מרגש! עסק בתחילת הדרך זה בדיוק השלב שבו שיווק נכון עושה את ההבדל.\n\nבוא נסתכל קדימה - מה היית רוצה שיקרה בשלושת החודשים הראשונים? (לקוחות, הכנסות, חשיפה - במילים שלך)'

  },

  },
};

// Branching matches by option INDEX (answerIdx), never by option text — the
// texts are language-dependent now. Indices refer to BASE_QUESTIONS' options
// order, which every translation preserves.
function applyConditionalLogic(questionId, optIdx) {
  // עסק שעוד לא באמת פועל — שאלות על העבר (מחזור, ניסיונות קודמים, פחדים היסטוריים)
  // לא רלוונטיות ומרגישות צורמות. מסירים אותן ושואלים במקומן שאלות שמסתכלות קדימה.
  if (questionId === 'financial_status' && optIdx === 3) {  // "עסק חדש..."
    const pastOrientedIds = ['revenue_trend', 'recent_revenue', 'biggest_fear'];
    questions = questions.filter((q, i) => i <= currentQ || !pastOrientedIds.includes(q.id));
    questions.splice(currentQ + 1, 0,
      localizeQuestion(CONDITIONAL_QUESTIONS.new_business_expectations),
      localizeQuestion(CONDITIONAL_QUESTIONS.new_business_concern)
    );
  }

  if (questionId === 'media_management'
      && optIdx === 0  // "אני בעצמי"
      && answers['marketing_budget'] && answerIdx['marketing_budget'] !== 0) {  // above "עד ₪1,000"
    questions.splice(currentQ + 1, 0,
      localizeQuestion(CONDITIONAL_QUESTIONS.self_managed_excitement_info));
  }

  if (questionId === 'organic_interest' && optIdx === 0) {  // "כן, מעוניין"
    questions.splice(currentQ + 1, 0,
      localizeQuestion(CONDITIONAL_QUESTIONS.organic_budget));
  }
}

function toggleMulti(opt, btn) {
  if (multiSelected.includes(opt)) { multiSelected = multiSelected.filter(o=>o!==opt); btn.classList.remove('selected'); }
  else { multiSelected.push(opt); btn.classList.add('selected'); }
}

function confirmMulti(grid) {
  if (multiSelected.length===0) return;
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
  addMessage(multiSelected.join(', '), 'user');
  answers[questions[currentQ].id] = multiSelected;
  currentQ++;
  setTimeout(() => nextQuestion(), 700);
}

const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function isValidEmail(email) {
  return EMAIL_REGEX.test(email);
}
function isValidPhone(phone) {
  const digits = phone.replace(/\D/g, '');
  return digits.length >= 9 && digits.length <= 13;
}

function sendText() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (checkoutStep === 'name') {
    checkoutName = text;
    addMessage(text, 'user');
    checkoutStep = 'phone';
    setTimeout(() => { addMessage(uallakI18n.t('ask_phone'), 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'phone') {
    addMessage(text, 'user');
    if (!isValidPhone(text)) {
      setTimeout(() => {
        addMessage(uallakI18n.t('bad_phone'), 'bot');
        document.getElementById('userInput').focus();
      }, 600);
      return;
    }
    checkoutPhone = text;
    checkoutStep = 'address';
    setTimeout(() => { addMessage(uallakI18n.t('ask_address'), 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'address') {
    checkoutAddress = text;
    addMessage(text, 'user');
    checkoutStep = 'business_name';
    setTimeout(() => { addMessage(uallakI18n.t('ask_business_name'), 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'business_name') {
    checkoutBusinessName = text;
    addMessage(text, 'user');
    checkoutStep = 'business_tax_id';
    setTimeout(() => { addMessage(uallakI18n.t('ask_tax_id'), 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'business_tax_id') {
    checkoutBusinessTaxId = text;
    addMessage(text, 'user');
    checkoutStep = 'email';
    setTimeout(() => { addMessage(uallakI18n.t('ask_email'), 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'email') {
    addMessage(text, 'user');
    if (!isValidEmail(text)) {
      setTimeout(() => {
        addMessage(uallakI18n.t('bad_email'), 'bot');
        document.getElementById('userInput').focus();
      }, 600);
      return;
    }
    checkoutStep = null;
    startCheckout(checkoutName, checkoutPhone, checkoutAddress, checkoutBusinessName, checkoutBusinessTaxId, text);
    return;
  }

  if (inPackageSelection) {
    addMessage(text, 'user');
    handleObjection(text);
    return;
  }

  addMessage(text, 'user');
  const questionId = questions[currentQ].id;
  answers[questionId] = text;
  currentQ++;

  // אחרי שאלת הפתיחה — שואלים שאלות דינמיות
  if (currentQ === 1 && !dynamicQsAdded) {
    dynamicQsAdded = true;
    loadDynamicQuestions();
  } else {
    maybeReact(questionId, text, nextQuestion);
  }
}

async function loadDynamicQuestions() {
  showTyping();
  
  try {
    // שלב 1 — סנן שאלות שכבר נענו בפתיחה
    const filterRes = await fetch('/api/filter-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const filterData = await filterRes.json();
    if (filterData.skip_ids && filterData.skip_ids.length > 0) {
      questions = questions.filter(q => !filterData.skip_ids.includes(q.id));
      console.log('Filtered out:', filterData.skip_ids);
    }
  } catch(e) {
    console.log('Filter failed, continuing');
  }

  try {
    // שלב 2 — הוסף שאלות דינמיות
    const res = await fetch('/api/dynamic-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const data = await res.json();
    if (data.questions && data.questions.length > 0) {
      questions.splice(currentQ, 0, ...data.questions);
    }
  } catch(e) {
    console.log('Dynamic questions failed, continuing');
  }

  hideTyping();
  setTimeout(() => nextQuestion(), 500);
}

function nextQuestion() {
  if (currentQ >= questions.length) { showProcessing(); return; }
  showTyping();
  setTimeout(() => {
    hideTyping();
    const q = questions[currentQ];
    if (q.type==='choice') addMessage(q.text, 'bot', q.options);
    else if (q.type==='multi') addMessage(q.text, 'bot', null, q.options);
    else if (q.type==='info') {
      addMessage(q.text, 'bot');
      currentQ++;
      setTimeout(() => nextQuestion(), 1200);
    }
    else { addMessage(q.text, 'bot'); document.getElementById('userInput').focus(); }
  }, 900);
}

function showProcessing() {
  addMessage(uallakI18n.t('processing_msg'), 'bot');
  setTimeout(() => {
    document.getElementById('processing').classList.add('active');
    const steps = ['step1','step2','step3','step4'];
    steps.forEach((s,i) => setTimeout(() => document.getElementById(s).classList.add('done'), i*12000));
    fetchProposal(answers);
  }, 800);
}

function hideProcessing() {
  document.getElementById('step5').classList.add('done');
  setTimeout(() => document.getElementById('processing').classList.remove('active'), 1200);
}

async function fetchProposal(answers) {
  try {
    const res = await fetch('/api/onboarding', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({answers})
    });
    const data = await res.json();
    hideProcessing();
    setTimeout(() => displayProposal(data.data), 1400);
  } catch(e) {
    document.getElementById('processing').classList.remove('active');
    addMessage(uallakI18n.t('generic_error'), 'bot');
  }
}

function displayProposal(data) {
  proposalData = data;
  const p = data.proposal;
  if (!p.approved) {
    addMessage(uallakI18n.t('reject_wrap', { reason: p.rejection_reason }), 'bot');
    return;
  }
  const t = uallakI18n.t;
  const risk = t(p.risk_level==='high'?'risk_high':p.risk_level==='medium'?'risk_medium':'risk_low');
  const marketBlock = p.market_reality ? `\n\n${t('proposal_market')} ${p.market_reality}` : '';
  const msg = `${t('proposal_ready')}\n\n${t('proposal_summary')} ${p.business_summary}${marketBlock}\n\n${t('proposal_risk')} ${risk}\n\n${t('proposal_goals')}\n${p.goals_90_days.map(g=>`  · ${g}`).join('\n')}\n\n💡 ${p.honest_note}\n\n${t('proposal_tips')}\n${p.self_help_tips.map(tip=>`  · ${tip}`).join('\n')}`;
  addMessage(msg, 'bot');
  setTimeout(() => {
    if (p.scarcity_note) addMessage(`🔥 ${p.scarcity_note}`, 'bot');
    setTimeout(() => showPackageOptions(p.packages || [], p.scarcity_note), p.scarcity_note ? 1300 : 200);
  }, 1500);
}

function showPackageOptions(packages, scarcityNote) {
  inPackageSelection = true;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const textDiv = document.createElement('div');
  textDiv.style.whiteSpace = 'pre-line';
  textDiv.dir = 'auto';
  textDiv.textContent = uallakI18n.t('pick_package');
  bubble.appendChild(textDiv);

  const grid = document.createElement('div');
  grid.className = 'options-grid';
  grid.style.flexDirection = 'column';
  const badgeHtml = scarcityNote
    ? `<span style="display:inline-block;margin-top:8px;padding:3px 10px;background:rgba(255,76,31,0.1);color:var(--accent);border-radius:100px;font-size:12px;font-weight:700;">${uallakI18n.t('pkg_badge')}</span>`
    : '';
  packages.forEach(pkg => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dir = 'auto';
    btn.style.cssText = 'width:100%;text-align:start;padding:14px 18px;';
    btn.innerHTML = `<strong>${pkg.name}</strong><br><span style="font-size:13px;color:var(--gray);">${pkg.description||''}</span><br><span style="font-size:13px;">${uallakI18n.t('pkg_price', { setup: pkg.setup_fee_total, monthly: pkg.monthly_management_total })}</span><br>${badgeHtml}`;
    btn.onclick = () => selectPackage(pkg, btn, grid);
    grid.appendChild(btn);
  });
  bubble.appendChild(grid);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function selectPackage(pkg, btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  btn.classList.add('selected');
  inPackageSelection = false;
  selectedPackage = pkg;
  addMessage(pkg.name, 'user');
  setTimeout(() => {
    addMessage(uallakI18n.t('pkg_chosen', { name: pkg.name }), 'bot');
    checkoutStep = 'name';
    document.getElementById('userInput').focus();
  }, 600);
}

async function handleObjection(text) {
  showTyping();
  try {
    const res = await fetch('/api/handle-objection', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        text,
        answers,
        empathy_final: (proposalData && proposalData.empathy_final) || {},
        packages: (proposalData && proposalData.proposal && proposalData.proposal.packages) || [],
      })
    });
    const data = await res.json();
    hideTyping();
    addMessage(data.reply || uallakI18n.t('objection_fallback'), 'bot');
    setTimeout(() => showPackageOptions(
      (proposalData.proposal && proposalData.proposal.packages) || [],
      proposalData.proposal && proposalData.proposal.scarcity_note
    ), 900);
  } catch(e) {
    hideTyping();
    addMessage(uallakI18n.t('small_glitch'), 'bot');
    setTimeout(() => showPackageOptions(
      (proposalData.proposal && proposalData.proposal.packages) || [],
      proposalData.proposal && proposalData.proposal.scarcity_note
    ), 900);
  }
}

function showOtherInput(btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  btn.classList.add('selected');

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;gap:8px;margin-top:10px;align-items:center;width:100%;';

  const label = document.createElement('span');
  label.textContent = uallakI18n.t('other_label');
  label.style.cssText = 'font-size:14px;color:#666;white-space:nowrap;';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'chat-input';
  input.style.cssText = 'flex:1;padding:8px 14px;font-size:14px;';
  input.dir = 'auto';
  input.placeholder = uallakI18n.t('other_ph');

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'send-btn';
  confirmBtn.style.cssText = 'width:36px;height:36px;flex-shrink:0;';
  confirmBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';

  const submit = () => {
    const text = input.value.trim();
    if (!text) return;
    wrapper.remove();
    addMessage(text, 'user');
    const questionId = questions[currentQ].id;
    answers[questionId] = text;
    currentQ++;
    maybeReact(questionId, text, nextQuestion);
  };

  confirmBtn.onclick = submit;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  wrapper.appendChild(label);
  wrapper.appendChild(input);
  wrapper.appendChild(confirmBtn);
  grid.parentElement.appendChild(wrapper);
  input.focus();
}

async function startCheckout(name, phone, address, businessName, businessTaxId, email) {
  addMessage(uallakI18n.t('preparing_payment'), 'bot');
  try {
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        client_name: name,
        client_phone: phone,
        client_address: address,
        business_name: businessName,
        business_tax_id: businessTaxId,
        client_email: email,
        package_id: selectedPackage ? selectedPackage.id : '',
        package_name: selectedPackage ? selectedPackage.name : '',
        setup_fee_total: selectedPackage ? selectedPackage.setup_fee_total : 0,
        monthly_management_total: selectedPackage ? selectedPackage.monthly_management_total : 0,
        language: uallakI18n.current(),
      })
    });
    const data = await res.json();
    if (data.success && data.data.approve_url) {
      addMessage(uallakI18n.t('payment_ready'), 'bot');
      setTimeout(() => { window.location.href = data.data.approve_url; }, 1200);
    } else {
      addMessage(uallakI18n.t('payment_error'), 'bot');
    }
  } catch(e) {
    addMessage(uallakI18n.t('generic_error'), 'bot');
  }
}

function showDashboardLinkButton() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  const btn = document.createElement('button');
  btn.className = 'option-btn';
  btn.style.cssText = 'background:#1A1A1A;color:white;';
  btn.textContent = uallakI18n.t('dashboard_btn');
  btn.onclick = () => { window.location.href = '/login/'; };
  grid.appendChild(btn);
  bubble.appendChild(grid);
  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const payment = params.get('payment');
  if (payment === 'success') {
    setTimeout(() => {
      addMessage(uallakI18n.t('paid_success'), 'bot');
      setTimeout(() => showDashboardLinkButton(), 900);
    }, 500);
    return;
  }
  if (payment === 'error') {
    setTimeout(() => addMessage(uallakI18n.t('paid_error'), 'bot'), 500);
    return;
  }
  if (payment === 'pending') {
    setTimeout(() => addMessage(uallakI18n.t('paid_pending'), 'bot'), 500);
    return;
  }
  setTimeout(() => { addMessage(questions[0].text, 'bot'); document.getElementById('userInput').focus(); }, 500);
};
