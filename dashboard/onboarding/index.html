<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uallak — איפיון עסקי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
:root {
  --bg: #F7F4EF;
  --ink: #1A1A1A;
  --accent: #FF4C1F;
  --green: #00C96E;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --gray: #8A8A8A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.chat-container { width:100%; max-width:680px; background:var(--card); border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.12); overflow:hidden; display:flex; flex-direction:column; height:90vh; max-height:780px; }
.chat-header { background:var(--ink); padding:20px 28px; display:flex; align-items:center; gap:14px; }
.chat-logo { font-size:22px; font-weight:700; color:white; letter-spacing:-1px; }
.chat-logo span { color:#FF4C1F; }
.chat-status { display:flex; align-items:center; gap:6px; font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
.status-dot { width:7px; height:7px; background:#00C96E; border-radius:50%; animation:pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
.chat-messages { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
.msg { display:flex; gap:12px; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
.msg-avatar { width:36px; height:36px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; flex-shrink:0; }
.msg-avatar.user-avatar { background:var(--accent); }
.msg-bubble { max-width:85%; padding:14px 18px; border-radius:18px; font-size:15px; line-height:1.6; }
.msg.bot .msg-bubble { background:#F0F0F0; border-radius:4px 18px 18px 18px; }
.msg.user .msg-bubble { background:var(--ink); color:white; border-radius:18px 4px 18px 18px; }
.msg.user { flex-direction:row-reverse; }
.options-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.option-btn { background:white; border:1.5px solid var(--border); padding:10px 16px; border-radius:100px; font-family:'Heebo',sans-serif; font-size:14px; cursor:pointer; transition:all 0.2s; color:var(--ink); }
.option-btn:hover { border-color:var(--accent); color:var(--accent); }
.option-btn.selected { background:var(--ink); color:white; border-color:var(--ink); }
.option-btn.multi.selected { background:var(--accent); border-color:var(--accent); color:white; }
.option-btn:disabled { cursor:default; opacity:0.6; }
.typing { display:flex; align-items:center; gap:5px; padding:14px 18px; }
.typing span { width:7px; height:7px; background:var(--gray); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
.chat-input-area { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
.chat-input { flex:1; padding:12px 18px; border:1.5px solid var(--border); border-radius:100px; font-family:'Heebo',sans-serif; font-size:15px; outline:none; transition:border 0.2s; background:var(--bg); }
.chat-input:focus { border-color:var(--accent); }
.send-btn { width:44px; height:44px; background:var(--ink); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { background:var(--accent); }
.processing { position:fixed; inset:0; background:rgba(247,244,239,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.5s; }
.processing.active { opacity:1; pointer-events:all; }
.proc-logo { font-size:32px; font-weight:900; margin-bottom:40px; letter-spacing:-1px; }
.proc-logo span { color:var(--accent); }
.proc-ring { width:80px; height:80px; border:3px solid rgba(0,0,0,0.08); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:32px; }
@keyframes spin{to{transform:rotate(360deg);}}
.proc-text { font-size:18px; font-weight:500; margin-bottom:12px; }
.proc-sub { font-size:14px; color:var(--gray); text-align:center; max-width:300px; line-height:1.6; }
.proc-steps { display:flex; flex-direction:column; gap:10px; margin-top:28px; width:280px; }
.proc-step { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--gray); opacity:0.3; transition:opacity 0.6s; }
.proc-step.done { opacity:1; color:#1A1A1A; }
.proc-step-icon { font-size:18px; }
</style>
</head>
<body>
<div class="processing" id="processing">
  <div class="proc-logo">u<span>allak</span></div>
  <div class="proc-ring"></div>
  <div class="proc-text">🏗️ בונים את התכנית שלך...</div>
  <div class="proc-sub">זה לוקח כ-60 שניות — אנחנו עובדים קשה בשבילך 💪<br>אל תצא מהדף</div>
  <div class="proc-steps">
    <div class="proc-step" id="step1"><span class="proc-step-icon">🔍</span> מנתח את פרופיל העסק שלך</div>
    <div class="proc-step" id="step2"><span class="proc-step-icon">📊</span> בודק את השוק והמתחרים</div>
    <div class="proc-step" id="step3"><span class="proc-step-icon">💡</span> בונה תכנית עבודה מותאמת</div>
    <div class="proc-step" id="step4"><span class="proc-step-icon">💰</span> מחשב הצעת מחיר מדויקת</div>
    <div class="proc-step" id="step5"><span class="proc-step-icon">🎉</span> התכנית שלך מוכנה!</div>
  </div>
</div>

<div class="chat-container">
  <div class="chat-header">
    <div>
      <div class="chat-logo">u<span>allak</span></div>
      <div class="chat-status"><span class="status-dot"></span>המערכת פעילה</div>
    </div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="userInput" placeholder="כתוב כאן..." onkeydown="if(event.key==='Enter') sendText()" />
    <button class="send-btn" onclick="sendText()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const BASE_QUESTIONS = [
  { id:"intro", type:"free_text", text:"שלום! אני המערכת של uallak 👋\n\nלפני שנבנה לך תכנית עבודה מותאמת אישית — ספר לי על העסק שלך ועל המצב הנוכחי. כמה משפטים חופשיים, בלי מגבלות." },
  { id:"business_age", type:"choice", text:"כמה זמן העסק קיים?", options:["פחות משנה","1-3 שנים","3-7 שנים","יותר מ-7 שנים"] },
  { id:"financial_status", type:"choice", text:"מה המצב הפיננסי הנוכחי?", options:["ברווח טוב","מכסה הוצאות בקושי","בהפסד","עסק חדש — עדיין לא ניתן לדעת"] },
  { id:"marketing_budget", type:"choice", text:"כמה אתה יכול להעמיד לשיווק בחודש?\n(לא כולל דמי הניהול שלנו)", options:["עד ₪1,000","₪1,000-3,000","₪3,000-8,000","₪8,000-15,000","₪15,000+"] },
  { id:"existing_digital", type:"multi", text:"מה יש לך כרגע דיגיטלית? (אפשר לבחור כמה)", options:["אתר אינטרנט","אינסטגרם פעיל","פייסבוק פעיל","TikTok","גוגל My Business","דיוור / ניוזלטר","כלום"] },
  { id:"main_goal", type:"choice", text:"מה המטרה הכי חשובה לך ב-3 חודשים הקרובים?", options:["יותר לידים ולקוחות חדשים","נראות מקצועית ומיתוג","קידום אורגני בגוגל","הגדלת מכירות אונליין","הכל — רוצה מעטפת מלאה"] },
  { id:"biggest_fear", type:"choice", text:"מה הכי מפחיד אותך בלנסות שירות שיווק חדש?", options:["לבזבז כסף ולא לראות תוצאות","אין לי זמן לנהל עוד דבר","ניסיתי בעבר ולא עבד","לא בטוח שהעסק מוכן","לא מפחיד — מוכן לנסות"] }
];

let questions = [...BASE_QUESTIONS];
let currentQ = 0;
let answers = {};
let multiSelected = [];
let dynamicQsAdded = false;

function addMessage(text, sender='bot', withOptions=null, multiOptions=null) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${sender==='user'?'user-avatar':''}`;
  avatar.textContent = sender==='bot' ? 'U' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const textDiv = document.createElement('div');
  textDiv.style.whiteSpace = 'pre-line';
  textDiv.textContent = text;
  bubble.appendChild(textDiv);

  if (withOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    withOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectOption(opt, btn, grid);
      grid.appendChild(btn);
    });
    bubble.appendChild(grid);
  }

  if (multiOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    multiSelected = [];
    multiOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn multi';
      btn.textContent = opt;
      btn.onclick = () => toggleMulti(opt, btn);
      grid.appendChild(btn);
    });
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'option-btn';
    confirmBtn.textContent = '✓ אישור בחירה';
    confirmBtn.style.cssText = 'background:#1A1A1A;color:white;width:100%;margin-top:4px;';
    confirmBtn.onclick = () => confirmMulti(grid);
    grid.appendChild(confirmBtn);
    bubble.appendChild(grid);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">U</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function selectOption(opt, btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => {
    grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
    addMessage(opt, 'user');
    answers[questions[currentQ].id] = opt;
    currentQ++;
    setTimeout(() => nextQuestion(), 700);
  }, 300);
}

function toggleMulti(opt, btn) {
  if (multiSelected.includes(opt)) { multiSelected = multiSelected.filter(o=>o!==opt); btn.classList.remove('selected'); }
  else { multiSelected.push(opt); btn.classList.add('selected'); }
}

function confirmMulti(grid) {
  if (multiSelected.length===0) return;
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
  addMessage(multiSelected.join(', '), 'user');
  answers[questions[currentQ].id] = multiSelected;
  currentQ++;
  setTimeout(() => nextQuestion(), 700);
}

function sendText() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  answers[questions[currentQ].id] = text;
  currentQ++;

  // אחרי שאלת הפתיחה — שואלים שאלות דינמיות
  if (currentQ === 1 && !dynamicQsAdded) {
    dynamicQsAdded = true;
    loadDynamicQuestions();
  } else {
    setTimeout(() => nextQuestion(), 700);
  }
}

async function loadDynamicQuestions() {
  showTyping();
  
  try {
    // שלב 1 — סנן שאלות שכבר נענו בפתיחה
    const filterRes = await fetch('/api/filter-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const filterData = await filterRes.json();
    if (filterData.skip_ids && filterData.skip_ids.length > 0) {
      questions = questions.filter(q => !filterData.skip_ids.includes(q.id));
      console.log('Filtered out:', filterData.skip_ids);
    }
  } catch(e) {
    console.log('Filter failed, continuing');
  }

  try {
    // שלב 2 — הוסף שאלות דינמיות
    const res = await fetch('/api/dynamic-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const data = await res.json();
    if (data.questions && data.questions.length > 0) {
      questions.splice(currentQ, 0, ...data.questions);
    }
  } catch(e) {
    console.log('Dynamic questions failed, continuing');
  }

  hideTyping();
  setTimeout(() => nextQuestion(), 500);
}

function nextQuestion() {
  if (currentQ >= questions.length) { showProcessing(); return; }
  showTyping();
  setTimeout(() => {
    hideTyping();
    const q = questions[currentQ];
    if (q.type==='choice') addMessage(q.text, 'bot', q.options);
    else if (q.type==='multi') addMessage(q.text, 'bot', null, q.options);
    else { addMessage(q.text, 'bot'); document.getElementById('userInput').focus(); }
  }, 900);
}

function showProcessing() {
  addMessage("תודה! המערכת עובדת עכשיו על התכנית המותאמת לך 🔄", 'bot');
  setTimeout(() => {
    document.getElementById('processing').classList.add('active');
    const steps = ['step1','step2','step3','step4'];
    steps.forEach((s,i) => setTimeout(() => document.getElementById(s).classList.add('done'), i*12000));
    fetchProposal(answers);
  }, 800);
}

function hideProcessing() {
  document.getElementById('step5').classList.add('done');
  setTimeout(() => document.getElementById('processing').classList.remove('active'), 1200);
}

async function fetchProposal(answers) {
  try {
    const res = await fetch('/api/onboarding', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({answers})
    });
    const data = await res.json();
    hideProcessing();
    setTimeout(() => displayProposal(data.data), 1400);
  } catch(e) {
    document.getElementById('processing').classList.remove('active');
    addMessage("אירעה שגיאה — נסה שוב או צור קשר בוואטסאפ 💬", 'bot');
  }
}

function displayProposal(data) {
  const p = data.proposal;
  if (!p.approved) {
    addMessage(`תודה שפנית אלינו 🙏\n\n${p.rejection_reason}\n\nאנחנו ממליצים לחזור אלינו כשהתנאים ישתנו — נשמח לעזור!`, 'bot');
    return;
  }
  const risk = p.risk_level==='high'?'גבוהה':p.risk_level==='medium'?'בינונית':'נמוכה';
  const msg = `✅ התכנית שלך מוכנה!\n\n📋 סיכום: ${p.business_summary}\n\n⚠️ רמת סיכון: ${risk}\n\n💰 עלות הקמה: ₪${p.setup_fee_total}\n📅 דמי ניהול חודשיים: ₪${p.monthly_management_total}\n🎁 ערך ההטבה שלך: ₪${p.benefit_value} (2 חודשי ניהול חינם!)\n\n🎯 יעדים ל-90 יום:\n${p.goals_90_days.map(g=>`  · ${g}`).join('\n')}\n\n💡 ${p.honest_note}\n\n🔧 דברים שאתה יכול לעשות לבד:\n${p.self_help_tips.map(t=>`  · ${t}`).join('\n')}`;
  addMessage(msg, 'bot');
  setTimeout(() => addMessage("רוצה להתקדם? לחץ כאן לתשלום והתחלת התהליך 🚀", 'bot', ["כן, מוכן להתחיל!", "יש לי עוד שאלות"]), 1500);
}

window.onload = () => setTimeout(() => { addMessage(questions[0].text, 'bot'); document.getElementById('userInput').focus(); }, 500);
</script>
</body>
</html>
