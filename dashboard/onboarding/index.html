<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uallak — איפיון עסקי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
:root {
  --bg: #F7F4EF;
  --ink: #1A1A1A;
  --accent: #FF4C1F;
  --green: #00C96E;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --gray: #8A8A8A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.chat-container { width:100%; max-width:680px; background:var(--card); border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.12); overflow:hidden; display:flex; flex-direction:column; height:90vh; max-height:780px; }
.chat-header { background:var(--ink); padding:20px 28px; display:flex; align-items:center; gap:14px; }
.chat-logo { font-size:22px; font-weight:700; color:white; letter-spacing:-1px; }
.chat-logo span { color:#FF4C1F; }
.chat-status { display:flex; align-items:center; gap:6px; font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
.status-dot { width:7px; height:7px; background:#00C96E; border-radius:50%; animation:pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
.chat-messages { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
.msg { display:flex; gap:12px; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
.msg-avatar { width:36px; height:36px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; flex-shrink:0; }
.msg-avatar.user-avatar { background:var(--accent); }
.msg-bubble { max-width:85%; padding:14px 18px; border-radius:18px; font-size:15px; line-height:1.6; }
.msg.bot .msg-bubble { background:#F0F0F0; border-radius:4px 18px 18px 18px; }
.msg.user .msg-bubble { background:var(--ink); color:white; border-radius:18px 4px 18px 18px; }
.msg.user { flex-direction:row-reverse; }
.options-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.option-btn { background:white; border:1.5px solid var(--border); padding:10px 16px; border-radius:100px; font-family:'Heebo',sans-serif; font-size:14px; cursor:pointer; transition:all 0.2s; color:var(--ink); }
.option-btn:hover { border-color:var(--accent); color:var(--accent); }
.option-btn.selected { background:var(--ink); color:white; border-color:var(--ink); }
.option-btn.multi.selected { background:var(--accent); border-color:var(--accent); color:white; }
.option-btn:disabled { cursor:default; opacity:0.6; }
.free-text-hint { font-size:12px; color:var(--gray); margin-top:8px; }
.typing { display:flex; align-items:center; gap:5px; padding:14px 18px; }
.typing span { width:7px; height:7px; background:var(--gray); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
.chat-input-area { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
.chat-input { flex:1; padding:12px 18px; border:1.5px solid var(--border); border-radius:100px; font-family:'Heebo',sans-serif; font-size:15px; outline:none; transition:border 0.2s; background:var(--bg); }
.chat-input:focus { border-color:var(--accent); }
.send-btn { width:44px; height:44px; background:var(--ink); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { background:var(--accent); }
.processing { position:fixed; inset:0; background:rgba(247,244,239,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.5s; }
.processing.active { opacity:1; pointer-events:all; }
.proc-logo { font-size:32px; font-weight:900; margin-bottom:40px; letter-spacing:-1px; }
.proc-logo span { color:var(--accent); }
.proc-ring { width:80px; height:80px; border:3px solid rgba(0,0,0,0.08); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:32px; }
@keyframes spin{to{transform:rotate(360deg);}}
.proc-text { font-size:18px; font-weight:500; margin-bottom:12px; }
.proc-sub { font-size:14px; color:var(--gray); text-align:center; max-width:300px; line-height:1.6; }
.proc-steps { display:flex; flex-direction:column; gap:10px; margin-top:28px; width:280px; }
.proc-step { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--gray); opacity:0.3; transition:opacity 0.6s; }
.proc-step.done { opacity:1; color:#1A1A1A; }
.proc-step-icon { font-size:18px; }
</style>
</head>
<body>
<div class="processing" id="processing">
  <div class="proc-logo">u<span>allak</span></div>
  <div class="proc-ring"></div>
  <div class="proc-text">🏗️ בונים את התכנית שלך...</div>
  <div class="proc-sub">זה לוקח כ-60 שניות — אנחנו עובדים קשה בשבילך 💪<br>אל תצא מהדף</div>
  <div class="proc-steps">
    <div class="proc-step" id="step1"><span class="proc-step-icon">🔍</span> מנתח את פרופיל העסק שלך</div>
    <div class="proc-step" id="step2"><span class="proc-step-icon">📊</span> בודק את השוק והמתחרים</div>
    <div class="proc-step" id="step3"><span class="proc-step-icon">💡</span> בונה תכנית עבודה מותאמת</div>
    <div class="proc-step" id="step4"><span class="proc-step-icon">💰</span> מחשב הצעת מחיר מדויקת</div>
    <div class="proc-step" id="step5"><span class="proc-step-icon">🎉</span> התכנית שלך מוכנה!</div>
  </div>
</div>

<div class="chat-container">
  <div class="chat-header">
    <div>
      <div class="chat-logo">u<span>allak</span></div>
      <div class="chat-status"><span class="status-dot"></span>המערכת פעילה</div>
    </div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="userInput" placeholder="כתוב כאן..." onkeydown="if(event.key==='Enter') sendText()" />
    <button class="send-btn" onclick="sendText()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const BASE_QUESTIONS = [
  { id:"intro", type:"free_text", text:"שלום! אני המערכת של uallak 👋\n\nלפני שנבנה לך תכנית עבודה מותאמת אישית — ספר לי על העסק שלך ועל המצב הנוכחי. כמה משפטים חופשיים, בלי מגבלות." },
  { id:"business_age", type:"choice", text:"כמה זמן העסק קיים?", options:["פחות משנה","1-3 שנים","3-7 שנים","יותר מ-7 שנים"] },
  { id:"financial_status", type:"choice", text:"מה המצב הפיננסי הנוכחי?", options:["ברווח טוב","מכסה הוצאות בקושי","בהפסד","עסק חדש — עדיין לא ניתן לדעת"] },
  { id:"revenue_trend", type:"choice", text:"איך נראה המחזור החודשי שלך ב-3 החודשים האחרונים?", options:["צמיחה קטנה","מדשדש במקום","בהפסד"] },
  { id:"recent_revenue", type:"free_text", text:"זה עוזר למערכת לקבוע יעדים מדויקים ולהבין את נקודת הפתיחה האמיתית שלך — מה היה המחזור החודשי הממוצע של העסק ב-3 החודשים האחרונים? (אפשר מספר משוער או טווח)" },
  { id:"marketing_budget", type:"choice", text:"כמה אתה יכול להעמיד לשיווק בחודש?\n(לא כולל דמי הניהול שלנו)", options:["עד ₪1,000","₪1,000-3,000","₪3,000-5,000","₪10,000+","₪15,000+"] },
  { id:"existing_digital", type:"multi", text:"מה יש לך כרגע דיגיטלית? (אפשר לבחור כמה)", options:["אתר אינטרנט","אינסטגרם פעיל","פייסבוק פעיל","TikTok","גוגל My Business","דיוור / ניוזלטר","כלום"] },
  { id:"newsletter_status", type:"choice", text:"יש לך היום רשימת דיוור/מיילים ללקוחות?", options:["כן, פעיל ושולח באופן קבוע","יש לי רשימה אבל לא שולח","אין לי בכלל"] },
  { id:"main_goal", type:"choice", text:"מה המטרה הכי חשובה לך ב-3 חודשים הקרובים?", options:["יותר לידים ולקוחות חדשים","נראות מקצועית ומיתוג","קידום אורגני בגוגל","הגדלת מכירות אונליין","הכל — רוצה מעטפת מלאה"] },
  { id:"biggest_fear", type:"choice", text:"מה הכי מפחיד אותך בלנסות שירות שיווק חדש?", options:["לבזבז כסף ולא לראות תוצאות","אין לי זמן לנהל עוד דבר","ניסיתי בעבר ולא עבד","לא בטוח שהעסק מוכן","לא מפחיד — מוכן לנסות"] },
  { id:"media_management", type:"choice", text:"מי מנהל היום את הנוכחות הדיגיטלית שלך בשוטף?", options:["אני בעצמי","עובד שלי","משרד פרסום חיצוני","פרילנסר","אף אחד כרגע - מוזנח"] },
  { id:"camera_comfort", type:"choice", text:"אם המערכת תיתן לך תסריט מוכן - תהיה מוכן להצטלם בעצמך או לבקש מהעובדים לשתף פעולה?", options:["כן בשמחה","רק אני","רק העובדים","מעדיף בלי מצלמה"] },
  { id:"media_assets", type:"choice", text:"איך אתה מתנהל היום מבחינת חומרי מדיה ועיצוב?", options:["יש לי מעצב/צלם קבוע","עובד עם משרד חיצוני","עושה הכל לבד","אין לי כלום היום"] },
  { id:"media_assets_info", type:"info", text:"בעזרת כלי AI מתקדמים ניצור עבורך תמונות שיווקיות מקצועיות מתוך תמונות הבסיס שתשלח לנו — הכל כלול בדמי הניהול. בנוסף, נקים לך תיקיית Drive מסודרת שבה תוכל לעיין ולאשר את כל החומרים לפני הפרסום 📁" },
  { id:"content_creator_collab", type:"choice", text:"האם היית מעוניין בשיתופי פעולה עם יוצרי תוכן — מוצר מתנה תמורת ביקורת, או תשלום עבור סרטון שגם משמש אותנו וגם עולה אצלם — בתקציב נפרד?", options:["כן","לא","אולי בהמשך"] },
  { id:"organic_history", type:"choice", text:"האם העסק היום מקודם או קודם בעבר אורגנית בגוגל?", options:["כן, מקודם היום","קודם בעבר אבל לא היום","אף פעם לא"] },
  { id:"organic_info", type:"info", text:"קידום אורגני זה כמו לבנות נכס דיגיטלי - בניגוד לפרסום ממומן שנעצר ברגע שמפסיקים לשלם, קידום אורגני ממשיך להביא לקוחות גם בטווח הארוך, ובונה אמון וסמכות לעסק שלך בגוגל לאורך זמן." },
  { id:"organic_interest", type:"choice", text:"היית רוצה להגיע למקומות הראשונים בגוגל, וגם שהבינה המלאכותית של גוגל תמליץ על העסק שלך כשאנשים מחפשים שירות דומה?", options:["כן, מעוניין","לא כרגע"] },
  { id:"organic_followup_info", type:"info", text:"תקבל דוח חודשי שקוף על ההתקדמות. חשוב לדעת שתוצאות משמעותיות בקידום אורגני לוקחות בממוצע כ-6 חודשים להבשיל - ולכן קריטי לא לעצור באמצע התהליך, כדי לא לאבד את המומנטום שנבנה." }
];

let questions = [...BASE_QUESTIONS];
let currentQ = 0;
let answers = {};
let multiSelected = [];
let dynamicQsAdded = false;
let proposalData = null;
let checkoutStep = null;
let checkoutName = null;
let inPackageSelection = false;
let selectedPackage = null;

// שאלות "משמעותיות" שאחריהן מציגים תגובה קצרה וחמה, כדי שהצ'אט ירגיש כמו שיחה
// ולא כמו טופס - לא אחרי כל תשובה, רק בנקודות שבאמת שווה לעצור בהן
const REACTION_QUESTION_IDS = new Set(['recent_revenue', 'revenue_trend', 'financial_status', 'biggest_fear', 'organic_budget']);

async function maybeReact(questionId, answerText, next) {
  if (!REACTION_QUESTION_IDS.has(questionId)) { setTimeout(next, 700); return; }
  showTyping();
  try {
    const q = questions.find(qq => qq.id === questionId);
    const res = await fetch('/api/reaction', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question_text: q ? q.text : '', answer_text: String(answerText) })
    });
    const data = await res.json();
    hideTyping();
    if (data.reaction) addMessage(data.reaction, 'bot');
    setTimeout(next, data.reaction ? 900 : 500);
  } catch (e) {
    hideTyping();
    setTimeout(next, 500);
  }
}

function addMessage(text, sender='bot', withOptions=null, multiOptions=null) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${sender==='user'?'user-avatar':''}`;
  avatar.textContent = sender==='bot' ? 'U' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const textDiv = document.createElement('div');
  textDiv.style.whiteSpace = 'pre-line';
  textDiv.textContent = text;
  bubble.appendChild(textDiv);

  if (withOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    withOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => (opt === 'אחר' || opt.startsWith('אחר'))
        ? showOtherInput(btn, grid)
        : selectOption(opt, btn, grid);
      grid.appendChild(btn);
    });
    bubble.appendChild(grid);
    const hint = document.createElement('div');
    hint.className = 'free-text-hint';
    hint.textContent = 'או כתוב תשובה משלך למטה 👇';
    bubble.appendChild(hint);
  }

  if (multiOptions) {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    multiSelected = [];
    multiOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn multi';
      btn.textContent = opt;
      btn.onclick = () => toggleMulti(opt, btn);
      grid.appendChild(btn);
    });
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'option-btn';
    confirmBtn.textContent = '✓ אישור בחירה';
    confirmBtn.style.cssText = 'background:#1A1A1A;color:white;width:100%;margin-top:4px;';
    confirmBtn.onclick = () => confirmMulti(grid);
    grid.appendChild(confirmBtn);
    bubble.appendChild(grid);
    const hint = document.createElement('div');
    hint.className = 'free-text-hint';
    hint.textContent = 'או כתוב תשובה משלך למטה 👇';
    bubble.appendChild(hint);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">U</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function selectOption(opt, btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => {
    grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
    addMessage(opt, 'user');
    const questionId = questions[currentQ].id;
    answers[questionId] = opt;
    applyConditionalLogic(questionId, opt);
    currentQ++;
    maybeReact(questionId, opt, nextQuestion);
  }, 300);
}

// שאלות/הודעות שמוכנסות דינמית לתוך questions[] בהתאם לתשובות קודמות - אותו דפוס
// כמו הוספת השאלות הדינמיות מה-API, רק מבוסס על תשובות שכבר ניתנו במקום קריאת שרת
function applyConditionalLogic(questionId, answerValue) {
  if (questionId === 'media_management'
      && answerValue === 'אני בעצמי'
      && answers['marketing_budget'] && answers['marketing_budget'] !== 'עד ₪1,000') {
    questions.splice(currentQ + 1, 0, {
      id: 'self_managed_excitement_info',
      type: 'info',
      text: 'וואו, מכבד את זה שאתה עושה הכל לבד! 💪 שווה שתדע - כחלק מהחבילה שלנו תקבל גם אוטומציות חכמות שעובדות בשבילך מאחורי הקלעים, כמו מענה אוטומטי ומיידי ללידים חדשים - כדי שאף פנייה לא תיפול בין הכיסאות בזמן שאתה עסוק בלנהל את הכל.'
    });
  }

  if (questionId === 'organic_interest' && answerValue === 'כן, מעוניין') {
    questions.splice(currentQ + 1, 0, {
      id: 'organic_budget',
      type: 'free_text',
      text: 'מעולה! כמה תקציב חודשי היית מוכן להעמיד ספציפית לקידום האורגני?\n\nחשוב לדעת - זה תקציב נפרד לגמרי מתקציב הפרסום הממומן שציינת קודם. התקציב הזה מכסה את הניהול שלנו ואת מנוי הכלי המקצועי (SEOptimer / SEMrush / Ahrefs, בהתאם לרמה המתאימה לך), ומתחיל מ-₪1,000 לחודש ומעלה.'
    });
  }
}

function toggleMulti(opt, btn) {
  if (multiSelected.includes(opt)) { multiSelected = multiSelected.filter(o=>o!==opt); btn.classList.remove('selected'); }
  else { multiSelected.push(opt); btn.classList.add('selected'); }
}

function confirmMulti(grid) {
  if (multiSelected.length===0) return;
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled=true; b.style.cursor='default'; });
  addMessage(multiSelected.join(', '), 'user');
  answers[questions[currentQ].id] = multiSelected;
  currentQ++;
  setTimeout(() => nextQuestion(), 700);
}

const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function isValidEmail(email) {
  return EMAIL_REGEX.test(email);
}

function sendText() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (checkoutStep === 'name') {
    checkoutName = text;
    addMessage(text, 'user');
    checkoutStep = 'email';
    setTimeout(() => { addMessage("ומה כתובת האימייל שלך?", 'bot'); document.getElementById('userInput').focus(); }, 600);
    return;
  }
  if (checkoutStep === 'email') {
    addMessage(text, 'user');
    if (!isValidEmail(text)) {
      setTimeout(() => {
        addMessage("זה לא נראה כמו כתובת מייל תקינה 🤔 תוכל לכתוב שוב?", 'bot');
        document.getElementById('userInput').focus();
      }, 600);
      return;
    }
    checkoutStep = null;
    startCheckout(checkoutName, text);
    return;
  }

  if (inPackageSelection) {
    addMessage(text, 'user');
    handleObjection(text);
    return;
  }

  addMessage(text, 'user');
  const questionId = questions[currentQ].id;
  answers[questionId] = text;
  currentQ++;

  // אחרי שאלת הפתיחה — שואלים שאלות דינמיות
  if (currentQ === 1 && !dynamicQsAdded) {
    dynamicQsAdded = true;
    loadDynamicQuestions();
  } else {
    maybeReact(questionId, text, nextQuestion);
  }
}

async function loadDynamicQuestions() {
  showTyping();
  
  try {
    // שלב 1 — סנן שאלות שכבר נענו בפתיחה
    const filterRes = await fetch('/api/filter-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const filterData = await filterRes.json();
    if (filterData.skip_ids && filterData.skip_ids.length > 0) {
      questions = questions.filter(q => !filterData.skip_ids.includes(q.id));
      console.log('Filtered out:', filterData.skip_ids);
    }
  } catch(e) {
    console.log('Filter failed, continuing');
  }

  try {
    // שלב 2 — הוסף שאלות דינמיות
    const res = await fetch('/api/dynamic-questions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intro: answers['intro'], answers })
    });
    const data = await res.json();
    if (data.questions && data.questions.length > 0) {
      questions.splice(currentQ, 0, ...data.questions);
    }
  } catch(e) {
    console.log('Dynamic questions failed, continuing');
  }

  hideTyping();
  setTimeout(() => nextQuestion(), 500);
}

function nextQuestion() {
  if (currentQ >= questions.length) { showProcessing(); return; }
  showTyping();
  setTimeout(() => {
    hideTyping();
    const q = questions[currentQ];
    if (q.type==='choice') addMessage(q.text, 'bot', q.options);
    else if (q.type==='multi') addMessage(q.text, 'bot', null, q.options);
    else if (q.type==='info') {
      addMessage(q.text, 'bot');
      currentQ++;
      setTimeout(() => nextQuestion(), 1200);
    }
    else { addMessage(q.text, 'bot'); document.getElementById('userInput').focus(); }
  }, 900);
}

function showProcessing() {
  addMessage("תודה! המערכת עובדת עכשיו על התכנית המותאמת לך 🔄", 'bot');
  setTimeout(() => {
    document.getElementById('processing').classList.add('active');
    const steps = ['step1','step2','step3','step4'];
    steps.forEach((s,i) => setTimeout(() => document.getElementById(s).classList.add('done'), i*12000));
    fetchProposal(answers);
  }, 800);
}

function hideProcessing() {
  document.getElementById('step5').classList.add('done');
  setTimeout(() => document.getElementById('processing').classList.remove('active'), 1200);
}

async function fetchProposal(answers) {
  try {
    const res = await fetch('/api/onboarding', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({answers})
    });
    const data = await res.json();
    hideProcessing();
    setTimeout(() => displayProposal(data.data), 1400);
  } catch(e) {
    document.getElementById('processing').classList.remove('active');
    addMessage("אירעה שגיאה — נסה שוב או צור קשר בוואטסאפ 💬", 'bot');
  }
}

function displayProposal(data) {
  proposalData = data;
  const p = data.proposal;
  if (!p.approved) {
    addMessage(`תודה שפנית אלינו 🙏\n\n${p.rejection_reason}\n\nאנחנו ממליצים לחזור אלינו כשהתנאים ישתנו — נשמח לעזור!`, 'bot');
    return;
  }
  const risk = p.risk_level==='high'?'גבוהה':p.risk_level==='medium'?'בינונית':'נמוכה';
  const msg = `✅ התכנית שלך מוכנה!\n\n📋 סיכום: ${p.business_summary}\n\n⚠️ רמת סיכון: ${risk}\n\n🎯 יעדים ל-90 יום:\n${p.goals_90_days.map(g=>`  · ${g}`).join('\n')}\n\n💡 ${p.honest_note}\n\n🔧 דברים שאתה יכול לעשות לבד:\n${p.self_help_tips.map(t=>`  · ${t}`).join('\n')}`;
  addMessage(msg, 'bot');
  setTimeout(() => {
    if (p.scarcity_note) addMessage(`🔥 ${p.scarcity_note}`, 'bot');
    setTimeout(() => showPackageOptions(p.packages || [], p.scarcity_note), p.scarcity_note ? 1300 : 200);
  }, 1500);
}

function showPackageOptions(packages, scarcityNote) {
  inPackageSelection = true;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const textDiv = document.createElement('div');
  textDiv.style.whiteSpace = 'pre-line';
  textDiv.textContent = 'הנה כמה אפשרויות שמתאימות לך — אין כאן תשובה "לא נכונה", תבחר את מה שמרגיש הכי נכון 👇';
  bubble.appendChild(textDiv);

  const grid = document.createElement('div');
  grid.className = 'options-grid';
  grid.style.flexDirection = 'column';
  const badgeHtml = scarcityNote
    ? `<span style="display:inline-block;margin-top:8px;padding:3px 10px;background:rgba(255,76,31,0.1);color:var(--accent);border-radius:100px;font-size:12px;font-weight:700;">🔥 1 מתוך 20 החודש</span>`
    : '';
  packages.forEach(pkg => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.cssText = 'width:100%;text-align:right;padding:14px 18px;';
    btn.innerHTML = `<strong>${pkg.name}</strong><br><span style="font-size:13px;color:var(--gray);">${pkg.description||''}</span><br><span style="font-size:13px;">הקמה ₪${pkg.setup_fee_total} · ניהול חודשי ₪${pkg.monthly_management_total}</span><br>${badgeHtml}`;
    btn.onclick = () => selectPackage(pkg, btn, grid);
    grid.appendChild(btn);
  });
  bubble.appendChild(grid);

  const hint = document.createElement('div');
  hint.className = 'free-text-hint';
  hint.textContent = 'יש לך שאלה או משהו שמטריד אותך? אפשר גם פשוט לכתוב את זה למטה 👇';
  bubble.appendChild(hint);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function selectPackage(pkg, btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  btn.classList.add('selected');
  inPackageSelection = false;
  selectedPackage = pkg;
  addMessage(pkg.name, 'user');
  setTimeout(() => {
    addMessage(`בחירה מעולה! "${pkg.name}" 😊\n\nרק שני פרטים קצרים לפני שממשיכים לתשלום — מה השם שלך?`, 'bot');
    checkoutStep = 'name';
    document.getElementById('userInput').focus();
  }, 600);
}

async function handleObjection(text) {
  showTyping();
  try {
    const res = await fetch('/api/handle-objection', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        text,
        answers,
        empathy_final: (proposalData && proposalData.empathy_final) || {},
        packages: (proposalData && proposalData.proposal && proposalData.proposal.packages) || [],
      })
    });
    const data = await res.json();
    hideTyping();
    addMessage(data.reply || "אפשר לספר לי קצת יותר על מה שמטריד אותך?", 'bot');
    setTimeout(() => showPackageOptions(
      (proposalData.proposal && proposalData.proposal.packages) || [],
      proposalData.proposal && proposalData.proposal.scarcity_note
    ), 900);
  } catch(e) {
    hideTyping();
    addMessage("מצטערים, הייתה תקלה קטנה — אפשר לנסות שוב? 🙏", 'bot');
    setTimeout(() => showPackageOptions(
      (proposalData.proposal && proposalData.proposal.packages) || [],
      proposalData.proposal && proposalData.proposal.scarcity_note
    ), 900);
  }
}

function showOtherInput(btn, grid) {
  grid.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  btn.classList.add('selected');

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;gap:8px;margin-top:10px;align-items:center;width:100%;';

  const label = document.createElement('span');
  label.textContent = 'אחר:';
  label.style.cssText = 'font-size:14px;color:#666;white-space:nowrap;';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'chat-input';
  input.style.cssText = 'flex:1;padding:8px 14px;font-size:14px;';
  input.placeholder = 'הקלד את תשובתך...';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'send-btn';
  confirmBtn.style.cssText = 'width:36px;height:36px;flex-shrink:0;';
  confirmBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';

  const submit = () => {
    const text = input.value.trim();
    if (!text) return;
    wrapper.remove();
    addMessage(text, 'user');
    const questionId = questions[currentQ].id;
    answers[questionId] = text;
    currentQ++;
    maybeReact(questionId, text, nextQuestion);
  };

  confirmBtn.onclick = submit;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  wrapper.appendChild(label);
  wrapper.appendChild(input);
  wrapper.appendChild(confirmBtn);
  grid.parentElement.appendChild(wrapper);
  input.focus();
}

async function startCheckout(name, email) {
  addMessage("רגע אחד, מכין את קישור התשלום שלך... 💳", 'bot');
  try {
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        client_name: name,
        client_email: email,
        package_id: selectedPackage ? selectedPackage.id : '',
        package_name: selectedPackage ? selectedPackage.name : '',
        setup_fee_total: selectedPackage ? selectedPackage.setup_fee_total : 0,
        monthly_management_total: selectedPackage ? selectedPackage.monthly_management_total : 0,
      })
    });
    const data = await res.json();
    if (data.success && data.data.approve_url) {
      addMessage("הקישור מוכן! מעביר אותך לדף האישור של PayPal 🚀", 'bot');
      setTimeout(() => { window.location.href = data.data.approve_url; }, 1200);
    } else {
      addMessage("אירעה שגיאה בהכנת התשלום — צור קשר בוואטסאפ 💬", 'bot');
    }
  } catch(e) {
    addMessage("אירעה שגיאה — נסה שוב או צור קשר בוואטסאפ 💬", 'bot');
  }
}

function showDashboardLinkButton(clientId) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  const btn = document.createElement('button');
  btn.className = 'option-btn';
  btn.style.cssText = 'background:#1A1A1A;color:white;';
  btn.textContent = 'לדשבורד שלי →';
  btn.onclick = () => { window.location.href = `/dashboard?client_id=${clientId}`; };
  grid.appendChild(btn);
  bubble.appendChild(grid);
  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const payment = params.get('payment');
  if (payment === 'success') {
    const clientId = params.get('client_id');
    setTimeout(() => {
      addMessage("התשלום התקבל בהצלחה! 🎉\n\nתודה שהצטרפת ל-uallak. שלחנו לך מייל עם כל הפרטים, כולל מספר הלקוח שלך.\n\nהדשבורד האישי שלך מוכן — תוכל לעקוב שם אחרי הפעילות, החיבורים ופרטי המנוי שלך. הצוות שלנו זמין בוואטסאפ לכל שאלה 💬", 'bot');
      if (clientId) setTimeout(() => showDashboardLinkButton(clientId), 900);
    }, 500);
    return;
  }
  if (payment === 'error') {
    setTimeout(() => addMessage("נראה שהייתה בעיה באישור התשלום 😕\n\nאפשר לנסות שוב או לפנות אלינו בוואטסאפ ונשלים את זה ביחד 💬", 'bot'), 500);
    return;
  }
  setTimeout(() => { addMessage(questions[0].text, 'bot'); document.getElementById('userInput').focus(); }, 500);
};
</script>
